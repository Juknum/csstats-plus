name: Release - Firefox Add-ons

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref (branch, tag, or SHA) to build
        required: false
        type: string
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Zip extensions
        run: pnpm zip -b firefox

      - name: Upload Firefox zip artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firefox-zips
          path: |
            .output/*-firefox.zip
            .output/*-sources.zip
          include-hidden-files: true
          compression-level: 0
          if-no-files-found: error

